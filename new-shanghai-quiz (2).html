<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Shanghai — Staff Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #7A1E1E;
    --bg-dark: #5E1515;
    --surface: rgba(255,255,255,0.08);
    --surface-hover: rgba(255,255,255,0.13);
    --border: rgba(201,168,76,0.22);
    --border-hover: rgba(201,168,76,0.5);
    --gold: #C9A84C;
    --gold-light: #E8CC80;
    --gold-dim: rgba(201,168,76,0.18);
    --cream: #F7F0E0;
    --cream-dim: rgba(247,240,224,0.65);
    --cream-faint: rgba(247,240,224,0.32);
    --green: #1D9E75;
    --green-bg: rgba(29,158,117,0.18);
    --green-border: rgba(29,158,117,0.5);
    --wrong-bg: rgba(0,0,0,0.15);
    --wrong-border: rgba(247,240,224,0.15);
  }
  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.07) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 100%, rgba(94,21,21,0.6) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .corner { position: fixed; width: 64px; height: 64px; z-index: 1; opacity: 0.45; }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 18px; left: 18px; }
  .corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
  .corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
  .corner.br { bottom: 18px; right: 18px; transform: scale(-1); }
  .wrap { position: relative; z-index: 2; width: 100%; max-width: 540px; }
  .brand-row { text-align: center; margin-bottom: 1.75rem; }
  .brand { font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: 0.32em; color: var(--gold); text-transform: uppercase; display: block; margin-bottom: 4px; }
  .brand-sub { font-size: 11px; letter-spacing: 0.14em; color: var(--cream-faint); text-transform: uppercase; }
  .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
  .divider-line { flex: 1; height: 0.5px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .divider-diamond { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cream); margin-bottom: 0.35rem; font-weight: 400; }
  .card-sub { font-size: 13px; color: var(--cream-dim); line-height: 1.65; margin-bottom: 1.25rem; }
  input[type="text"] {
    width: 100%; background: rgba(0,0,0,0.15); border: 0.5px solid rgba(201,168,76,0.3);
    border-radius: 8px; color: var(--cream); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 11px 14px; outline: none; margin-bottom: 10px; transition: border-color 0.2s;
  }
  input[type="text"]::placeholder { color: rgba(247,240,224,0.22); }
  input[type="text"]:focus { border-color: rgba(201,168,76,0.65); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 11px 24px; border-radius: 8px; border: 0.5px solid rgba(201,168,76,0.45);
    background: transparent; color: var(--gold); font-family: 'DM Sans', sans-serif;
    font-size: 13px; letter-spacing: 0.08em; cursor: pointer; text-transform: uppercase;
    transition: all 0.18s; width: 100%;
  }
  .btn:hover { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--gold-dim); border-color: var(--gold); }
  .hud { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .hud-score { font-size: 13px; font-weight: 500; color: var(--gold); }
  .hud-counter { font-size: 12px; color: var(--cream-faint); letter-spacing: 0.05em; }
  .streak { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: rgba(201,168,76,0.14); color: var(--gold-light); border: 0.5px solid rgba(201,168,76,0.38); display: none; }
  .streak.show { display: inline-block; }
  .progress-bar { height: 3px; background: rgba(247,240,224,0.1); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
  .trick-tag { display: inline-block; font-size: 10px; padding: 2px 9px; border-radius: 10px; background: rgba(201,168,76,0.14); color: var(--gold); border: 0.5px solid rgba(201,168,76,0.38); margin-bottom: 9px; letter-spacing: 0.06em; text-transform: uppercase; }
  .q-text { font-size: 15px; font-weight: 500; color: var(--cream); line-height: 1.55; margin-bottom: 1.1rem; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    background: rgba(0,0,0,0.12); border: 0.5px solid rgba(201,168,76,0.15);
    border-radius: 9px; padding: 11px 14px; font-size: 13px; color: var(--cream-dim);
    cursor: pointer; text-align: left; display: flex; align-items: flex-start; gap: 10px;
    transition: all 0.15s; font-family: 'DM Sans', sans-serif; line-height: 1.5; width: 100%;
  }
  .opt:hover:not(:disabled) { background: var(--surface-hover); border-color: rgba(201,168,76,0.4); color: var(--cream); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: var(--green-bg); border-color: var(--green-border); color: #A8EDCE; }
  .opt.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: rgba(247,240,224,0.35); }
  .opt-letter { font-size: 11px; font-weight: 500; color: rgba(247,240,224,0.22); min-width: 16px; margin-top: 1px; flex-shrink: 0; }
  .opt.correct .opt-letter { color: #5DCAA5; }
  .opt.wrong .opt-letter { color: rgba(247,240,224,0.18); }
  .feedback { margin-top: 1rem; padding: 11px 14px; border-radius: 9px; font-size: 13px; line-height: 1.6; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--green-bg); color: #A8EDCE; border: 0.5px solid var(--green-border); }
  .feedback.wrong { background: rgba(0,0,0,0.18); color: var(--cream-dim); border: 0.5px solid rgba(247,240,224,0.1); }
  .nav { display: flex; justify-content: flex-end; margin-top: 1rem; }
  .next-btn {
    padding: 10px 22px; border-radius: 8px; border: 0.5px solid rgba(201,168,76,0.4);
    background: transparent; color: var(--gold); font-family: 'DM Sans', sans-serif;
    font-size: 13px; letter-spacing: 0.08em; cursor: pointer; text-transform: uppercase;
    transition: all 0.18s; display: none;
  }
  .next-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
  .next-btn:active { transform: scale(0.97); }
  .result-emoji { font-size: 44px; margin-bottom: 0.75rem; text-align: center; }
  .result-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold-light); text-align: center; margin-bottom: 0.35rem; }
  .result-sub { font-size: 13px; color: var(--cream-dim); text-align: center; line-height: 1.65; margin-bottom: 1.5rem; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: rgba(0,0,0,0.18); border: 0.5px solid rgba(201,168,76,0.18); border-radius: 10px; padding: 0.9rem 0.75rem; text-align: center; }
  .stat-n { font-size: 22px; font-weight: 500; color: var(--gold-light); }
  .stat-l { font-size: 11px; color: var(--cream-faint); margin-top: 3px; letter-spacing: 0.06em; text-transform: uppercase; }
  .lb-head { font-size: 11px; font-weight: 500; color: var(--cream-faint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-top: 1.25rem; border-top: 0.5px solid rgba(201,168,76,0.18); }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid rgba(247,240,224,0.06); font-size: 13px; }
  .lb-rank { font-size: 11px; color: var(--cream-faint); min-width: 18px; }
  .lb-name { flex: 1; color: var(--cream-dim); }
  .lb-pts { color: var(--gold); }
  .lb-date { font-size: 11px; color: rgba(247,240,224,0.18); }
  .lb-you { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: var(--green-bg); color: #5DCAA5; border: 0.5px solid var(--green-border); margin-left: 4px; }
  .medal { color: var(--gold); font-size: 13px; }
  @media (max-width: 480px) { body { padding: 1.25rem 0.75rem 2rem; } .card { padding: 1.1rem; } .corner { width: 44px; height: 44px; } }
</style>
</head>
<body>

<div class="corner tl"><svg viewBox="0 0 80 80" fill="none"><path d="M4 76 L4 4 L76 4" stroke="#C9A84C" stroke-width="1"/><path d="M4 44 L4 4 L44 4" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/><circle cx="4" cy="4" r="3" fill="#C9A84C"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 80 80" fill="none"><path d="M4 76 L4 4 L76 4" stroke="#C9A84C" stroke-width="1"/><path d="M4 44 L4 4 L44 4" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/><circle cx="4" cy="4" r="3" fill="#C9A84C"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 80 80" fill="none"><path d="M4 76 L4 4 L76 4" stroke="#C9A84C" stroke-width="1"/><path d="M4 44 L4 4 L44 4" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/><circle cx="4" cy="4" r="3" fill="#C9A84C"/></svg></div>
<div class="corner br"><svg viewBox="0 0 80 80" fill="none"><path d="M4 76 L4 4 L76 4" stroke="#C9A84C" stroke-width="1"/><path d="M4 44 L4 4 L44 4" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/><circle cx="4" cy="4" r="3" fill="#C9A84C"/></svg></div>

<div class="wrap">
  <div class="brand-row">
    <span class="brand">New Shanghai</span>
    <span class="brand-sub">Staff Knowledge Quiz · Read The Menu</span>
  </div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <div id="name-screen">
    <div class="card">
      <p class="card-title">Think you know the menu?</p>
      <p class="card-sub">20 questions. Trick questions included. Some are sneaky, some are fun, all of them will haunt you if you get them wrong. Streak bonuses in play. Top scores go on the board.</p>
      <input type="text" id="player-name" placeholder="Your name or nickname..." maxlength="20" />
      <button class="btn primary" onclick="startQuiz()">Let's go</button>
    </div>
    <div id="lb-preview"></div>
  </div>

  <div id="game-screen" style="display:none;">
    <div class="hud">
      <span class="hud-score" id="score-label">Score: 0</span>
      <span class="streak" id="streak-badge"></span>
      <span class="hud-counter" id="q-counter">Q1 / 20</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="card">
      <div id="trick-tag-wrap"></div>
      <div class="q-text" id="q-text"></div>
      <div class="opts" id="q-options"></div>
      <div class="feedback" id="q-feedback"></div>
    </div>
    <div class="nav">
      <button class="next-btn" id="next-btn" onclick="nextQ()">Next</button>
    </div>
  </div>

  <div id="result-screen" style="display:none;">
    <div class="card">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-n" id="r-score"></div><div class="stat-l">Points</div></div>
        <div class="stat"><div class="stat-n" id="r-pct"></div><div class="stat-l">Score</div></div>
        <div class="stat"><div class="stat-n" id="r-streak"></div><div class="stat-l">Best streak</div></div>
      </div>
      <div id="leaderboard"></div>
      <button class="btn" onclick="restartQuiz()" style="margin-top:1.25rem;">Play again</button>
    </div>
  </div>
</div>

<script>
const ALL_Q = [

  {
    q: "How many grams of rice are in one bowl of steam rice?",
    opts: ["180g", "220g", "250g", "300g"],
    ans: 2,
    explain: "250g — every single time. Not 249g, not 251g. If you've been freestyling the rice scoop, this is your reckoning."
  },

  {
    q: "What proportion of egg batter is used in the sweet and sour chicken?",
    trick: true,
    opts: ["30% egg, 70% flour", "50/50 egg and flour", "Pure egg white only", "None — there is no egg batter"],
    ans: 3,
    explain: "Trick question! There is no egg batter in the sweet and sour chicken. If you just told a table it has 'a light egg coating' — go find them and correct yourself immediately."
  },

  {
    q: "What specific ingredient gives our lava sauce its distinctive orange colour?",
    opts: ["Paprika", "Turmeric", "Annatto / achiote", "Saffron"],
    ans: 1,
    explain: "Turmeric — nature's most aggressive fabric stainer and the hero behind that gorgeous orange lava sauce. Handle near white shirts at your own risk."
  },

  {
    q: "Xiaolongbao is a soup dumpling. What is the secret that makes it soupy after it's been folded and steamed?",
    opts: ["The chef blows into each one before sealing", "Gelatinised stock (aspic) is added solid, then melts during steaming", "The meat releases natural juices when kneaded correctly", "Hot broth is injected with a needle after cooking"],
    ans: 1,
    explain: "Gelatinised stock — aspic — is mixed in solid with the filling. During steaming it melts into glorious hot soup trapped inside the wrapper. Whoever invented this deserves a monument."
  },

  {
    q: "In a professional kitchen, what does '86' mean?",
    opts: ["A menu item is sold out or unavailable", "Table 86 is a VIP reservation", "The oven is set to 86°C", "It's end of service"],
    ans: 0,
    explain: "'86'd' means the kitchen is out of that item — or sometimes that a guest has been asked to leave. If you didn't know this, welcome to the industry."
  },

  {
    q: "A guest insists har gow 'should be fried, not steamed' and asks you to fix it. What do you do?",
    opts: ["Apologise and take it back to the kitchen to fry", "Explain calmly — har gow is always steamed, that skin is the entire point", "Offer a fried alternative without correcting them", "Nod, smile, and bring out the same thing again"],
    ans: 1,
    explain: "Stand your ground — politely. That translucent, silky wrapper IS the dish. If you quietly re-fried it, you just destroyed a century of Cantonese tradition. Don't."
  },

  {
    q: "Shanghai is known as 'The Paris of the East.' What does Paris call itself?",
    opts: ["The Shanghai of the West", "The City of Light", "The New Shanghai of Europe", "The Dim Sum Capital of France"],
    ans: 1,
    explain: "The City of Light. Paris got the nickname first, Shanghai got the better dumplings. History is complicated."
  },

  {
    q: "In Chinese culture, what does it mean when someone taps two fingers on the table after you pour their tea?",
    opts: ["They want more tea", "They are signalling they are full", "It is a silent thank you — a Qing dynasty gesture", "They are unhappy with the service"],
    ans: 2,
    explain: "A silent thank you. Rooted in a story where the Qing Emperor, disguised as a commoner, poured tea for companions who couldn't bow without revealing him — so they tapped bent fingers instead. 300 years of etiquette, every shift."
  },

  {
    q: "What is the correct sequence for handling a formal guest complaint?",
    opts: ["Apologise → Fix → Inform manager → Document", "Listen → Acknowledge → Fix → Follow up", "Escalate to manager → Manager decides → Apologise", "Offer a discount → Apologise → Move on"],
    ans: 1,
    explain: "Listen first — fully, without interrupting. Acknowledge. Fix immediately. Follow up. A discount is not an apology. It's a bribe. Lead with humanity."
  },

  {
    q: "Mid-service, your POS system crashes. Orders are still coming in. What do you do?",
    opts: ["Pause all service until IT resolves it", "Switch to manual order pads and communicate verbally with the kitchen", "Accept cash orders only", "Ask guests to wait until the system recovers"],
    ans: 1,
    explain: "Manual pads. Clear kitchen communication. Service continues. A POS crash is an inconvenience. Stopping service is a choice — and the wrong one."
  },

  {
    q: "What is the origin city of the original xiaolongbao?",
    opts: ["Beijing", "Guangzhou", "Nanxiang, Shanghai", "Chengdu"],
    ans: 2,
    explain: "Nanxiang, a suburb of Shanghai — invented in the 1870s. That's nearly 150 years of soup dumplings. Some legacies are just built different."
  },

  {
    q: "How many pleats should a properly made xiaolongbao have?",
    opts: ["8", "12", "18", "Whatever the chef feels like"],
    ans: 2,
    explain: "18 pleats — the traditional standard. It's not decorative. The pleats are structural, keeping the soup sealed inside. Count them next time. We'll wait."
  },

  {
    q: "What does LFL (like-for-like) sales growth actually measure?",
    opts: ["Growth including all new location openings", "Year-on-year sales from the same trading locations", "Growth after removing delivery revenue", "Gross profit margin improvement"],
    ans: 1,
    explain: "LFL strips out new openings and compares the same units year-on-year. The cleanest measure of organic growth. If Elvis is asking about LFL numbers, it's not small talk."
  },

  {
    q: "Siu mai is traditionally topped with which ingredient in Cantonese dim sum?",
    opts: ["Black sesame seeds", "A single prawn", "Fish roe / tobiko", "A sliver of black truffle"],
    ans: 2,
    explain: "Fish roe — tobiko — is the classic Cantonese topping on siu mai. It adds colour, texture, and the kind of detail that separates a dim sum house from a dumpling shop."
  },

  {
    q: "A guest leaves a 1-star Google review while still seated in the restaurant. Your best move?",
    opts: ["Address it online after they leave", "Approach them calmly now — this is your best chance to recover it", "Offer a discount without speaking to them first", "Ignore it, regulars don't read reviews"],
    ans: 1,
    explain: "Go to them. Genuinely, calmly. A real recovery done in person — while they're still there — is worth ten online responses. They may update the review themselves. Or at least leave full."
  },

  {
    q: "What is the Bund in Shanghai?",
    opts: ["A famous dim sum restaurant district", "A historic waterfront promenade lined with colonial-era buildings", "The Shanghai stock exchange building", "A type of steamed Chinese bun"],
    ans: 1,
    explain: "The Bund is Shanghai's iconic waterfront — colonial architecture on one side, futuristic Pudong skyline on the other. One of the most dramatic cityscapes on earth. And none of our tables have that view."
  },

  {
    q: "What is the correct ratio for a dim sum brunch? A table of 4 — roughly how many dim sum dishes should you recommend to start?",
    trick: true,
    opts: ["2 dishes — keep it light", "4 dishes — one per person", "6 to 8 dishes — dim sum is sharing, not portions", "Ask the guest, it varies completely"],
    ans: 2,
    explain: "6 to 8 dishes to start for a table of 4 — dim sum is communal, not portioned. Two dishes per person thinking is the mistake. Guide the table into the experience, not just the order."
  },

  {
    q: "Shanghai has a population of approximately how many people?",
    opts: ["8 million", "15 million", "24 million", "40 million"],
    ans: 2,
    explain: "About 24 million — making it one of the most populous cities on earth. That's a lot of potential guests. All of them with opinions about har gow."
  },

  {
    q: "Cheung fun is a dim sum staple. What is it made from?",
    opts: ["Wheat flour dough, steamed then rolled", "Rice flour batter, steamed into thin sheets then rolled", "Tapioca starch, deep fried", "Egg noodles, blanched and rolled"],
    ans: 1,
    explain: "Rice flour batter steamed into silky thin sheets, then rolled around various fillings — prawn, beef, pork, or char siu. The texture is the point: smooth, soft, yielding. Nothing else eats quite like it."
  },

  {
    q: "What is the proper way to eat xiaolongbao without third-degree burns to your mouth?",
    opts: ["Bite it whole immediately", "Place on spoon, bite a small hole, sip soup first, then eat", "Cut in half with chopsticks to release steam", "Just blow on it and hope for the best"],
    ans: 1,
    explain: "Spoon first — always. Bite a tiny hole in the side, sip the soup slowly, then eat the dumpling. Biting it whole means scorching soup on your chin in front of your table. We've all seen it. Don't be that person."
  }

];

let questions = [], current = 0, score = 0, streak = 0, bestStreak = 0, answered = false, playerName = '';
const BOARD_KEY = 'ns_quiz_v5';
const TOTAL = 20;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz() {
  playerName = (document.getElementById('player-name').value.trim() || 'Anonymous').slice(0, 20);
  questions = shuffle(ALL_Q).slice(0, TOTAL);
  current = 0; score = 0; streak = 0; bestStreak = 0;
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = questions[current];
  document.getElementById('q-counter').textContent = 'Q' + (current + 1) + ' / ' + TOTAL;
  document.getElementById('progress-fill').style.width = Math.round((current / TOTAL) * 100) + '%';
  document.getElementById('score-label').textContent = 'Score: ' + score;
  document.getElementById('trick-tag-wrap').innerHTML = q.trick ? '<span class="trick-tag">⚠ Trick question</span>' : '';
  document.getElementById('q-text').textContent = q.q;
  const letters = ['A', 'B', 'C', 'D'];
  document.getElementById('q-options').innerHTML = q.opts.map((o, i) =>
    `<button class="opt" onclick="answer(${i})" id="opt-${i}"><span class="opt-letter">${letters[i]}</span>${o}</button>`
  ).join('');
  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback'; fb.textContent = '';
  document.getElementById('next-btn').style.display = 'none';
  answered = false;
  updateStreak();
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const correct = idx === q.ans;
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx && !correct) b.classList.add('wrong');
  });
  if (correct) {
    score += 10 + (streak >= 2 ? 5 : 0);
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    streak = 0;
  }
  updateStreak();
  document.getElementById('score-label').textContent = 'Score: ' + score;
  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
  fb.textContent = (correct ? '✓ ' : '✗ ') + q.explain;
  const nb = document.getElementById('next-btn');
  nb.style.display = 'inline-block';
  nb.textContent = current + 1 < TOTAL ? 'Next →' : 'See results →';
}

function updateStreak() {
  const el = document.getElementById('streak-badge');
  if (streak >= 2) { el.textContent = streak + ' streak 🔥'; el.className = 'streak show'; }
  else { el.className = 'streak'; }
}

function nextQ() {
  current++;
  if (current >= TOTAL) { showResult(); return; }
  renderQ();
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const maxScore = TOTAL * 10;
  const pct = Math.round((score / maxScore) * 100);
  let emoji, title, sub;
  if (pct >= 90)      { emoji = '🏆'; title = 'You are the menu.'; sub = "At this point you should be writing the training manual. Genuinely impressive. Elvis, take note."; }
  else if (pct >= 75) { emoji = '🥟'; title = 'Solid shift.'; sub = "Strong all round. The XLB aspic question didn't break you. Respect."; }
  else if (pct >= 55) { emoji = '🍜'; title = 'Getting there.'; sub = "Good foundation. A few gaps. Spend 10 minutes with the menu bible this week and come back stronger."; }
  else if (pct >= 40) { emoji = '🫖'; title = 'Needs work.'; sub = "You know where the restaurant is. That's a start. Read the menu. All of it. Then try again."; }
  else                { emoji = '😬'; title = 'Oh dear.'; sub = "We appreciate your honesty by playing. Please speak to your manager. Not about the score — just in general."; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-pct').textContent = pct + '%';
  document.getElementById('r-streak').textContent = bestStreak + 'x';
  saveAndShowBoard(score);
}

function saveAndShowBoard(myScore) {
  let board = [];
  try { board = JSON.parse(localStorage.getItem(BOARD_KEY) || '[]'); } catch(e) {}
  board.push({ name: playerName, score: myScore, date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) });
  board.sort((a, b) => b.score - a.score);
  board = board.slice(0, 10);
  try { localStorage.setItem(BOARD_KEY, JSON.stringify(board)); } catch(e) {}
  const myIdx = board.findIndex(e => e.name === playerName && e.score === myScore);
  renderBoard('leaderboard', board, myIdx);
}

function renderBoard(id, board, myIdx) {
  const el = document.getElementById(id);
  if (!el || board.length === 0) return;
  const medals = ['🥇', '🥈', '🥉'];
  el.innerHTML = '<p class="lb-head">Leaderboard</p>' +
    board.map((e, i) =>
      `<div class="lb-row">
        <span class="lb-rank">${medals[i] || (i + 1)}</span>
        <span class="lb-name">${e.name}${i === myIdx ? '<span class="lb-you">you</span>' : ''}</span>
        <span class="lb-pts">${e.score} pts</span>
        <span class="lb-date">${e.date}</span>
      </div>`
    ).join('');
}

function showLbPreview() {
  let board = [];
  try { board = JSON.parse(localStorage.getItem(BOARD_KEY) || '[]'); } catch(e) {}
  if (board.length === 0) return;
  const wrap = document.getElementById('lb-preview');
  wrap.innerHTML = '<div class="card" id="lb-preview-inner"></div>';
  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('lb-preview-inner').innerHTML = '<p class="lb-head">Leaderboard</p>' +
    board.map((e, i) =>
      `<div class="lb-row">
        <span class="lb-rank">${medals[i] || (i + 1)}</span>
        <span class="lb-name">${e.name}</span>
        <span class="lb-pts">${e.score} pts</span>
        <span class="lb-date">${e.date}</span>
      </div>`
    ).join('');
}

function restartQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('name-screen').style.display = 'block';
  document.getElementById('player-name').value = playerName;
  showLbPreview();
}

document.getElementById('player-name').addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(); });
showLbPreview();
</script>
</body>
</html>
